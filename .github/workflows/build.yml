name: Build & Release APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:          # allow manual runs from the GitHub UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 ────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle wrapper permission ─────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── 4. Decode keystore from secret ───────────────────────────────────
      - name: Decode keystore
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks

      # ── 5. Build debug APK (always) ───────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── 6. Build release APK (main/master only, requires keystore) ────────
      - name: Build Release APK
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      # ── 7. Upload debug APK as artifact ───────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: KristuJayantiLMS-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── 8. Upload release APK as artifact ────────────────────────────────
      - name: Upload Release APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: KristuJayantiLMS-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 9. Create GitHub Release on push to main ─────────────────────────
      - name: Get short SHA
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "KristuJayanti LMS v1.0.${{ github.run_number }}"
          body: |
            ## Kristu Jayanti Exam LMS – Android App

            Auto-built from commit `${{ steps.sha.outputs.short }}`.

            ### What's included
            - WebView wrapper for https://www.kristujayantiexamlms.com
            - Splash screen
            - Pull-to-refresh
            - Back navigation support
            - Offline error handling

            ### Install
            Download the **release** APK below and install it on your Android device
            (enable *Install from unknown sources* if prompted).
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
